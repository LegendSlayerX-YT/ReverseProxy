events {}

http {
  server_tokens off;

  # Redirect all plain HTTP to HTTPS.
  server {
    listen 80;
    server_name chess.chen-henry.org math.chen-henry.org app.chen-henry.org;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl;
    server_name chess.chen-henry.org;

    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/cert_key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
      proxy_pass http://host.docker.internal:8001;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_read_timeout 600;
      proxy_connect_timeout 60;
    }
  }

  server {
    listen 443 ssl;
    server_name math.chen-henry.org;

    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/cert_key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
      proxy_pass http://host.docker.internal:8000;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_read_timeout 600;
      proxy_connect_timeout 60;
    }
  }

  server {
    listen 443 ssl default_server;
    server_name app.chen-henry.org;

    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/cert_key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
      proxy_pass http://host.docker.internal:3000;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_read_timeout 600;
      proxy_connect_timeout 60;
    }
  }
}
